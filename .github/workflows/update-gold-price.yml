name: Update gold price

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest gold price
        run: |
          tmp_file="$(mktemp)"
          if curl --fail --silent --show-error             --header "Accept: application/json"             --header "User-Agent: ThaiGoldCalculator/1.0"             "https://goldtraders.or.th/api/GoldPrices/Latest?readjson=false"             --output "$tmp_file"; then
            mv "$tmp_file" latest-gold-price.json
          else
            echo "Gold Traders Association source is temporarily unavailable; keeping existing cache."
            rm -f "$tmp_file"
            exit 0
          fi

      - name: Commit updated price
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest-gold-price.json
          git diff --cached --quiet || git commit -m "Update latest gold price"
          git push
